name: Update BadSSL Certificates

# Run monthly on the 1st at 00:00 UTC, or manually
on:
  schedule:
    - cron: '0 0 1 * *'  # Monthly on the 1st
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update-certs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check certificate expiration
        id: check-expiry
        run: |
          cd test/core/root_cert/certs

          # Check if certificate expires within 30 days
          if openssl x509 -in cert.crt -noout -checkend 2592000; then
            echo "Certificate is still valid for more than 30 days"
            echo "needs_update=false" >> $GITHUB_OUTPUT
          else
            echo "Certificate expires within 30 days or is already expired"
            echo "needs_update=true" >> $GITHUB_OUTPUT

            # Get expiration date for PR description
            EXPIRY_DATE=$(openssl x509 -in cert.crt -noout -enddate | cut -d= -f2)
            echo "expiry_date=${EXPIRY_DATE}" >> $GITHUB_OUTPUT
          fi

      - name: Update certificates
        if: steps.check-expiry.outputs.needs_update == 'true'
        run: |
          cd test/core/root_cert/certs
          ./update-certs.sh

      - name: Set up Python 3.11
        if: steps.check-expiry.outputs.needs_update == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check-expiry.outputs.needs_update == 'true'
        run: |
          pip install poetry
          poetry install

      - name: Run certificate tests
        if: steps.check-expiry.outputs.needs_update == 'true'
        run: |
          poetry run pytest test/core/test_certs.py -v

      - name: Get certificate info
        if: steps.check-expiry.outputs.needs_update == 'true'
        id: cert-info
        run: |
          cd test/core/root_cert/certs

          # Get new certificate details
          SUBJECT=$(openssl x509 -in cert.crt -noout -subject | sed 's/subject=//')
          ISSUER=$(openssl x509 -in cert.crt -noout -issuer | sed 's/issuer=//')
          START_DATE=$(openssl x509 -in cert.crt -noout -startdate | cut -d= -f2)
          END_DATE=$(openssl x509 -in cert.crt -noout -enddate | cut -d= -f2)
          SERIAL=$(openssl x509 -in cert.crt -noout -serial | cut -d= -f2)

          # Create PR body
          cat > /tmp/pr-body.md << EOF
          ## BadSSL Certificate Update

          This PR updates the BadSSL test certificates which were expiring soon.

          ### Previous Certificate
          - **Expiry Date**: ${{ steps.check-expiry.outputs.expiry_date }}

          ### New Certificate Details
          - **Subject**: ${SUBJECT}
          - **Issuer**: ${ISSUER}
          - **Valid From**: ${START_DATE}
          - **Valid Until**: ${END_DATE}
          - **Serial Number**: ${SERIAL}

          ### Files Updated
          - \`test/core/root_cert/certs/no-password.pem\`
          - \`test/core/root_cert/certs/cert.crt\`
          - \`test/core/root_cert/certs/key.key\`
          - \`test/core/root_cert/certs/badssl.com-client.p12\`

          ### Tests
          Certificate tests have been run and passed ✅

          ### Source
          Certificates downloaded from: https://badssl.com/certs/
          EOF

          echo "pr_body_file=/tmp/pr-body.md" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.check-expiry.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: update badssl certificates

            - Downloaded latest certificates from badssl.com
            - Certificate was expiring on ${{ steps.check-expiry.outputs.expiry_date }}
            - All certificate tests passing
          branch: update-badssl-certs
          delete-branch: true
          title: 'chore: Update BadSSL test certificates'
          body-path: ${{ steps.cert-info.outputs.pr_body_file }}
          labels: |
            dependencies
            tests
            automated
          assignees: ${{ github.repository_owner }}
